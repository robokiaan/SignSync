name: Deploy static site to GitHub Pages

# Serves app/static/ as-is, after regenerating the dictionary/lessons/
# sentences JSON (scripts/build_static_data.py) from the source manifests -
# see that script's docstring. Reference videos are NOT part of this: they're
# hosted externally (VIDEO_BASE_URL in app.js), so this artifact stays small
# and fast to deploy on every push.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build static data (dictionary/lessons/sentences JSON)
        run: python scripts/build_static_data.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/static

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
